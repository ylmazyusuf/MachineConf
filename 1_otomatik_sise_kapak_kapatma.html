
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Görüntüleyici</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212; /* Koyu tema */
            flex-direction: column;
            color: #fff;
        }
        h1 {
            color: #e0e0e0;
            margin-bottom: 20px;
        }
        model-viewer {
            width: 80%;
            max-width: 800px;
            height: 600px;
            background-color: #1e1e1e;
            border-radius: 12px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <h1>İnteraktif 3D 🚀</h1>

    <model-viewer
        src="1_otomatik_sise_kapak_kapatma.glb"
        alt="3D modeli"
        ar
        shadow-intensity="1"
        camera-controls
        auto-rotate
		ar-modes="webxr scene-viewer quick-look"
		vr-mode-ui="enabled"
        touch-action="pan-y">
    </model-viewer>

</body>
</html>
